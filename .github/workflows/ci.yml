name: CI

on:
  push:
    branches: [monorepo]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
     - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check types
        run: pnpm check-types

      - name: Build project
        run: pnpm build